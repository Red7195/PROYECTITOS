<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - The WhiteBox</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="plantilla.css">
    <script src="script.js" defer></script>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container my-5">
    <div class="row justify-content-center">
        <!-- Col-md-8 hace que en PC sea ancho y en móvil ocupe casi toda la pantalla -->
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 p-4">
                <div class="card-body">
                    <h2 class="text-center mb-4">Registra tus datos</h2>
                    
                    <!-- Acción ajustada a la carpeta obligatoria /php/ según rúbrica -->
                    <form action="php/register.php" method="post" name="form" onsubmit="return validarDatos()">
                        
                        <div class="row">
                            <div class="col-12 mb-3">
                                <label class="form-label">Nombres</label>
                                <input type="text" name="nombre" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido Paterno</label>
                                <input type="text" name="apellidop" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Apellido Materno</label>
                                <input type="text" name="apellidom" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="ejemplo@correo.com" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="text" name="telefono" class="form-control" placeholder="9 1234 5678" maxlength="11" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Dirección</label>
                                <input type="text" name="direccion" class="form-control" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="contraseña" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Confirmar Contraseña</label>
                                <input type="password" name="confirmar_contraseña" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">Crear Cuenta</button>
                        </div>
                        
                        <p class="text-center mt-3 small">
                            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body> 
</html>
