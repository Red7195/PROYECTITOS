<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - The WhiteBox</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tu misma plantilla ajustada -->
    <link rel="stylesheet" href="plantilla.css">
    <script src="JAVA/script.js" defer></script>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <!-- El login suele ser más angosto (col-lg-4) para verse más elegante -->
        <div class="col-12 col-sm-10 col-md-7 col-lg-4">
            <div class="card shadow-lg border-0 p-4">
                <div class="card-body">
                    <h2 class="text-center mb-4">Ingrese sus Credenciales</h2>
                    
                    <!-- Acción ajustada a la carpeta /php/ según la estructura obligatoria -->
                    <form action="php/login.php" method="post" name="form" onsubmit="return validarDatos()">
                        
                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" name="correo" class="form-control" placeholder="nombre@correo.com" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" name="contraseña" class="form-control" placeholder="••••••••" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Enviar</button>
                        </div>

                        <div class="text-center mt-4">
                            <p class="small mb-0">¿No tienes cuenta?</p>
                            <a href="register.html" class="text-decoration-none">Regístrate aquí</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body> 
</html>
